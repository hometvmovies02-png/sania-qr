<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sania ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display',serif;
color:white;
text-align:center;
overflow:hidden;
}

/* Lavender romantic blurred background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2") center/cover no-repeat;
filter:blur(12px) brightness(0.7);
z-index:-1;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(190,150,255,0.35);
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:520px;
}

/* Stylish headings */

h1{
font-family:'Great Vibes',cursive;
font-size:70px;
text-shadow:0 0 20px pink;
}

h2{
font-family:'Great Vibes',cursive;
font-size:50px;
text-shadow:0 0 15px pink;
}

p{
font-size:20px;
line-height:1.7;
text-shadow:0 0 10px rgba(255,200,255,0.8);
}

/* Stylish button */

button{
padding:14px 32px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4da6,#ff66cc);
color:white;
cursor:pointer;
margin-top:25px;
box-shadow:0 0 15px #ff4da6;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Glowing hearts */

.heart{
position:absolute;
color:#ff4da6;
font-size:26px;
animation:floatUp linear infinite, glow 2s ease-in-out infinite alternate;
text-shadow:0 0 10px #ff4da6,0 0 20px #ff1493,0 0 40px #ff1493;
}

@keyframes glow{
0%{text-shadow:0 0 10px #ff4da6;}
100%{text-shadow:0 0 40px #ff1493;}
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* Stylish flying date */

.date{
position:absolute;
font-family:'Great Vibes',cursive;
font-size:90px;
color:#ffd6ff;
opacity:0.35;
white-space:nowrap;
animation:flyDate 12s linear infinite;
text-shadow:0 0 20px pink;
}

@keyframes flyDate{
0%{transform:translateX(-120vw);}
100%{transform:translateX(120vw);}
}

</style>
</head>

<body>

<!-- Custom Background Music -->

<audio id="music" loop preload="auto">
<source src="music.mp3" type="audio/mpeg">
</audio>


<!-- PAGE 1 -->

<div class="container" id="page1">

<h1>Hi Sania ❤️</h1>
<p>I made something special for you…</p>

<button onclick="nextPage()">Next</button>

</div>


<!-- PAGE 2 -->

<div class="container" id="page2" style="display:none;">

<h2>Have you found this card?</h2>

<p>
If yes, then you already opened something from my heart.<br><br>
Before you read the letter completely,<br>
watch this first.
</p>

<button onclick="showVideo()">Yes ❤️</button>

</div>


<!-- VIDEO PAGE FULLSCREEN -->

<div id="videoPage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">

<iframe 
width="100%" 
height="100%" 
src="https://drive.google.com/file/d/1TSIVGGk9L-_ZIu_IF_av3JWXSYNw2QyB/preview"
allow="autoplay"
frameborder="0">
</iframe>

</div>


<script>

let music=document.getElementById("music")
let heartInterval
let dateInterval

function nextPage(){

document.getElementById("page1").style.display="none"
document.getElementById("page2").style.display="block"

/* start custom music */

music.volume=0.7
music.play().catch(()=>{})

startHearts()
startDate()

}

function showVideo(){

document.getElementById("page2").style.display="none"
document.getElementById("videoPage").style.display="block"

/* stop animations */

clearInterval(heartInterval)
clearInterval(dateInterval)

document.querySelectorAll(".heart").forEach(e=>e.remove())
document.querySelectorAll(".date").forEach(e=>e.remove())

}

function startHearts(){

heartInterval=setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(20+Math.random()*30)+"px"
heart.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),8000)

},300)

}

function startDate(){

dateInterval=setInterval(()=>{

let date=document.createElement("div")

date.className="date"
date.innerText="2 February 2026"

date.style.top=Math.random()*80+"vh"

document.body.appendChild(date)

setTimeout(()=>date.remove(),12000)

},3000)

}

</script>

</body>
</html>
